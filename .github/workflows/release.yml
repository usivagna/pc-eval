name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the v prefix (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Android APK  (ubuntu runner – smallest / fastest)
  # ──────────────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
            echo "VERSION=${VER#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Android APK
        run: |
          dotnet publish src/PCEval/PCEval.csproj \
            -f net9.0-android \
            -c Release \
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.VERSION }} \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:AndroidKeyStore=false \
            -o publish/android

      - name: Rename APK
        run: |
          mkdir -p dist
          APK=$(find publish/android -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK file found in publish/android" >&2
            exit 1
          fi
          cp "$APK" dist/PCEval-${{ steps.version.outputs.VERSION }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/PCEval-*.apk

  # ──────────────────────────────────────────────────────────────────────────
  # Windows – self-contained publish (no MSIX signing required)
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
            echo "VERSION=${VER#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Windows (self-contained, no MSIX)
        run: |
          dotnet publish src/PCEval/PCEval.csproj `
            -f net9.0-windows10.0.19041.0 `
            -c Release `
            -r win-x64 `
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.VERSION }} `
            -p:ApplicationVersion=${{ github.run_number }} `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:SelfContained=true `
            -o publish\windows

      - name: Zip Windows publish
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path publish\windows\* -DestinationPath dist\PCEval-${{ steps.version.outputs.VERSION }}-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/PCEval-*.zip

  # ──────────────────────────────────────────────────────────────────────────
  # macOS – Mac Catalyst .pkg
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Mac Catalyst workload
        run: dotnet workload install maui-maccatalyst

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
            echo "VERSION=${VER#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish macOS (Mac Catalyst, unsigned)
        run: |
          dotnet publish src/PCEval/PCEval.csproj \
            -f net9.0-maccatalyst \
            -c Release \
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.VERSION }} \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignEntitlements="" \
            -o publish/macos

      - name: Collect macOS artifact
        run: |
          mkdir -p dist
          # Prefer a .pkg installer; fall back to zipping a .app bundle
          PKG=$(find publish/macos -name "*.pkg" | head -1)
          APP=$(find publish/macos -name "*.app" -print -quit)
          if [ -n "$PKG" ]; then
            cp "$PKG" dist/PCEval-${{ steps.version.outputs.VERSION }}-macos.pkg
          elif [ -n "$APP" ]; then
            cd publish/macos
            zip -r "../../dist/PCEval-${{ steps.version.outputs.VERSION }}-macos.zip" "$(basename "$APP")"
            cd -
          else
            echo "ERROR: No .pkg or .app found in publish/macos" >&2
            ls -la publish/macos || true
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: dist/PCEval-*-macos.*

  # ──────────────────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────────────────────────────────────
  create-release:
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
            echo "TAG=v${RAW#v}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Error: tag ${TAG} already exists on origin."
            exit 1
          fi
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          generate_release_notes: true
          files: |
            artifacts/**/*

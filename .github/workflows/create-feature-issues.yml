name: Create Feature Issues

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create Battery Life Evaluation issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Battery Life Evaluation',
              body: `## Goal
            Add a Battery Life tab that compares a PC laptop's battery capacity and real-world endurance against equivalent MacBook models in the Apple lineup.

            ## Background
            Battery longevity is one of the most cited reasons buyers choose Apple Silicon MacBooks. A clear, data-backed comparison helps users understand the trade-off.

            ## Key Evaluation Dimensions

            1. **Battery Capacity (Wh)** – Raw watt-hour capacity vs comparable MacBook tiers
            2. **Estimated Runtime** – Projected hours for common workloads (web browsing, video playback, light productivity) based on TDP and capacity
            3. **Charge Speed** – Wattage supported and time-to-80% estimate
            4. **Power Adapter Size / Weight** – Portability impact (Apple's adapters are notably compact)
            5. **Battery Health Indicators** – Cycle count, design vs full charge capacity (where OS APIs expose this)

            ## Apple Reference Targets
            | MacBook Model | Battery (Wh) | Claimed Runtime |
            |---------------|-------------|----------------|
            | MacBook Air M3 13″ | 52.6 Wh | 18 h |
            | MacBook Air M3 15″ | 66.5 Wh | 18 h |
            | MacBook Pro M4 14″ | 72.4 Wh | 24 h |
            | MacBook Pro M4 16″ | 99.6 Wh | 24 h |

            ## Scorecard Metrics
            - Estimated battery life (hours) vs Apple equivalent: PASS / REVIEW / FAIL
            - Charge speed (W): PASS / REVIEW / FAIL
            - Battery capacity (Wh): PASS / REVIEW / FAIL

            ## Platform Detection
            - **Windows:** WMI \`Win32_Battery\` + PowerShell \`Get-WmiObject\`
            - **macOS:** \`system_profiler SPPowerDataType\` + \`ioreg\`
            - **Linux:** \`/sys/class/power_supply/\`

            ## Success Criteria
            Users can quickly see how their PC's battery life compares to an equivalent MacBook and understand the efficiency gap driven by Apple Silicon.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add Battery Life Evaluation');

      - name: Create Price-to-Performance Comparison issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Price-to-Performance Comparison',
              body: `## Goal
            Add a Price/Value tab that positions the user's PC against the Apple lineup by price tier, helping buyers understand what they get per dollar compared to a Mac.

            ## Background
            Price is frequently the primary differentiator buyers cite. A structured value comparison across performance tiers makes the trade-offs explicit.

            ## Key Evaluation Dimensions

            1. **Nearest Apple Tier** – Map the detected system's performance tier to the closest MacBook/Mac model by price bracket
            2. **Performance per Dollar** – Score the PC's CPU, GPU, and display against the Apple equivalent at the same price point
            3. **Value Verdict** – Consumer-friendly summary: "Better value", "Comparable", or "Apple offers more at this price"
            4. **Total Cost of Ownership** – Optional: factor in AppleCare, accessory ecosystem, and upgrade path

            ## Apple Reference Price Tiers
            | Tier | Model | Starting Price (USD) |
            |------|-------|---------------------|
            | Entry | MacBook Air M3 13″ | \$1,099 |
            | Mid | MacBook Air M3 15″ | \$1,299 |
            | Pro | MacBook Pro M4 14″ | \$1,599 |
            | Pro Max | MacBook Pro M4 16″ | \$2,499 |
            | Desktop | Mac Mini M4 | \$599 |

            ## Scorecard Metrics
            - Performance score per dollar vs nearest Apple tier
            - Display quality per dollar
            - Memory/storage per dollar

            ## Implementation Notes
            - Allow the user to enter their PC's purchase price
            - Use the detected processor tier and display scores already computed by the other tabs
            - Map to the nearest Apple model by price and performance
            - Display a clear side-by-side comparison table

            ## Success Criteria
            A buyer can enter their PC price and immediately see whether they are getting more, less, or equivalent value compared to the nearest Apple product.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add Price-to-Performance Comparison');

      - name: Create Ports and Connectivity Evaluation issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Ports and Connectivity Evaluation',
              body: `## Goal
            Add a Ports & Connectivity tab that compares the I/O capabilities of a PC against Apple's Mac lineup, with a focus on Thunderbolt/USB4, display outputs, and wireless standards.

            ## Background
            Apple's I/O has been a point of contention — modern Macs have consolidated to USB-C/Thunderbolt while many PCs retain a broader mix of ports. A structured comparison surfaces connectivity trade-offs.

            ## Key Evaluation Dimensions

            1. **Thunderbolt / USB4 Ports** – Count, generation (TB3/TB4/USB4 Gen 3), and bandwidth vs Mac
            2. **USB-A Ports** – Presence and count (Mac has none on Air/Pro)
            3. **SD Card Reader** – Presence and speed tier (UHS-I vs UHS-II)
            4. **HDMI Output** – Version (2.0 vs 2.1) and presence
            5. **MagSafe / Charging Port** – Proprietary vs standard USB-C charging
            6. **Wi-Fi Standard** – Wi-Fi 5 / 6 / 6E / 7 vs Mac baseline (Wi-Fi 6E on M3)
            7. **Bluetooth Version** – 5.0 / 5.1 / 5.3 / 6.0
            8. **Ethernet** – Built-in Gigabit / 2.5G vs dongle required on Mac

            ## Apple Reference Targets
            | Port | MacBook Air M3 | MacBook Pro M4 |
            |------|---------------|----------------|
            | Thunderbolt | 2× TB3 (USB4) | 3× TB5 |
            | USB-A | None | None |
            | SD Card | None | SDXC (UHS-II) |
            | HDMI | None | HDMI 2.1 |
            | Wi-Fi | Wi-Fi 6E | Wi-Fi 6E |

            ## Platform Detection
            - **Windows:** WMI / Device Manager enumeration
            - **macOS:** \`system_profiler SPUSBDataType SPThunderboltDataType\`
            - **Linux:** \`lspci\` / \`lsusb\` / \`/sys/bus/\`

            ## Success Criteria
            Users can see a clear side-by-side table of their PC's ports vs the equivalent Mac and understand the connectivity trade-offs.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add Ports and Connectivity Evaluation');

      - name: Create Thermal Performance Evaluation issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Thermal Performance Evaluation',
              body: `## Goal
            Add a Thermal Performance tab that surfaces the user's PC cooling profile (fan presence, TDP, throttling behavior) and compares it against Apple Silicon's passive/active cooling design.

            ## Background
            Apple Silicon MacBooks are famous for low-noise, low-heat operation — particularly the fanless MacBook Air. Thermal behavior directly impacts sustained performance, noise, and user comfort.

            ## Key Evaluation Dimensions

            1. **Cooling Type** – Fanless / single fan / dual fan vs Mac equivalent (Air is fanless, Pro has fan)
            2. **TDP (Thermal Design Power)** – Configured TDP vs Apple M-series chip TDP
            3. **Sustained vs Burst Performance** – Detect throttling using short CPU stress test data or rely on tier database values
            4. **Fan Noise Tier** – Inferred from cooling type and TDP: Silent / Quiet / Audible / Loud
            5. **Idle Temperatures** – Report current CPU temperature vs Apple Silicon's typical idle range

            ## Apple Reference Targets
            | Model | Cooling | TDP | Fan Noise |
            |-------|---------|-----|-----------|
            | MacBook Air M3 | Fanless | 15–30 W | Silent |
            | MacBook Pro M4 14″ | Single fan | 30 W | Quiet |
            | MacBook Pro M4 16″ | Dual fan | 45 W | Quiet |

            ## Scorecard Metrics
            - Cooling type vs Apple equivalent: PASS / REVIEW / FAIL
            - TDP vs Apple equivalent: PASS / REVIEW / FAIL
            - Sustained performance ratio (burst vs sustained): PASS / REVIEW / FAIL

            ## Platform Detection
            - **Windows:** WMI \`MSAcpi_ThermalZoneTemperature\` / OpenHardwareMonitor WMI bridge
            - **macOS:** \`powermetrics\` / \`smc\` readings via \`ioreg\`
            - **Linux:** \`/sys/class/thermal/\` / \`lm-sensors\`

            ## Success Criteria
            Users understand whether their PC runs hotter and louder than an equivalent Mac, and whether thermal throttling will impact real-world performance.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add Thermal Performance Evaluation');

      - name: Create GPU Performance Evaluation issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add GPU Performance Evaluation',
              body: `## Goal
            Add a dedicated GPU tab that compares the user's graphics hardware (integrated or discrete) to Apple's GPU tiers in the M-series lineup.

            ## Background
            The current Processor tab includes a basic integrated GPU score, but a full GPU evaluation tab would give deeper insight for creative and gaming workloads — a major decision factor for buyers choosing between Mac and PC.

            ## Key Evaluation Dimensions

            1. **GPU Tier** – Integrated vs discrete; vendor; estimated performance tier
            2. **Rasterization Performance** – General rendering throughput (mapped from benchmark database)
            3. **Video Encode / Decode** – Hardware acceleration support (H.264, HEVC, AV1, ProRes on Apple)
            4. **Machine Learning / AI Acceleration** – CUDA / ROCm / Metal support; NPU presence
            5. **Memory Bandwidth** – VRAM bandwidth vs Apple Unified Memory bandwidth
            6. **VRAM Capacity** – Dedicated VRAM vs Apple's unified memory pool
            7. **API Support** – DirectX 12 Ultimate / Vulkan / Metal

            ## Apple GPU Reference Targets
            | Apple GPU | Cores | Estimated Perf | Unified Memory BW |
            |-----------|-------|---------------|-------------------|
            | M3 (10-core GPU) | 10 | 100 | 100 GB/s |
            | M3 Pro (18-core GPU) | 18 | 140 | 150 GB/s |
            | M3 Max (40-core GPU) | 40 | 280 | 400 GB/s |
            | M4 (10-core GPU) | 10 | 115 | 120 GB/s |

            ## Scorecard Metrics
            - Rasterization score vs Apple equivalent: PASS / REVIEW / FAIL
            - Video hardware acceleration: PASS / REVIEW / FAIL
            - Memory bandwidth: PASS / REVIEW / FAIL

            ## Platform Detection
            - **Windows:** DXGI adapter enumeration / WMI \`Win32_VideoController\`
            - **macOS:** \`system_profiler SPDisplaysDataType\`
            - **Linux:** \`lspci\` / \`clinfo\` / \`vulkaninfo\`

            ## Success Criteria
            Users who do creative work or gaming can quickly see how their PC's GPU compares to Apple's integrated GPU at the same performance tier.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add GPU Performance Evaluation');

      - name: Create Overall System Score issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Overall System Score and Apple Equivalent Recommendation',
              body: `## Goal
            Add a Summary tab (or dashboard view) that aggregates all individual category scores into a single overall system score and maps the PC to the closest Apple equivalent with a buy/consider/skip verdict.

            ## Background
            Individual tabs give per-dimension data, but buyers need a final answer: "Which Mac would I need to buy to get this level of performance?" This summary tab answers that question.

            ## Key Components

            1. **Aggregate Score** – Weighted average of all evaluated categories:
               - Display: 20%
               - Processor: 30%
               - GPU: 20%
               - Memory & Storage: 15%
               - Battery: 10%
               - Connectivity: 5%
            2. **Nearest Apple Equivalent** – The Mac model that most closely matches the PC's aggregate score profile
            3. **Verdict** – "Better than [Mac model]", "Equivalent to [Mac model]", or "Below [Mac model]"
            4. **Category Breakdown** – Radar/spider chart or bar chart showing per-category performance
            5. **Consumer Recommendation** – Plain-English summary: ideal use case, notable strengths, and notable gaps vs Apple

            ## Example Output
            > **Your PC scores 87/100 overall**
            > Closest Apple equivalent: **MacBook Pro M4 14″**
            > - ✅ Display quality exceeds MacBook Pro M4
            > - ✅ Processor performance is comparable
            > - ⚠️ Battery life is significantly shorter
            > - ❌ Thermal performance is below MacBook Pro M4
            >
            > **Verdict:** If battery life and thermal silence are priorities, consider the MacBook Pro M4. If you need Windows software or a wider port selection, this PC is a strong alternative.

            ## Implementation Notes
            - Only show scores for tabs that have been evaluated
            - Weights should be configurable or based on detected use-case profile
            - Nearest Apple model match should use a cosine similarity or Euclidean distance across normalized score vectors

            ## Success Criteria
            A buyer who has run all evaluation tabs receives a single-page summary they can share or screenshot to compare against Apple's lineup.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add Overall System Score and Apple Equivalent Recommendation');

      - name: Create Export Results issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Export and Share Results',
              body: `## Goal
            Allow users to export their full evaluation scorecard as a shareable artifact — PDF report, PNG image, or JSON data — so they can share results for purchasing decisions or forum discussions.

            ## Background
            Users frequently want to share their PC evaluation results with others (e.g., on Reddit, tech forums, or with a purchasing manager). Currently, there is no way to export results outside of a manual screenshot.

            ## Export Formats

            1. **PNG Screenshot** – Captures the full Summary tab (or all tabs) as a single image
            2. **PDF Report** – Formatted multi-page report with all category scorecards, the overall score, and Apple comparison
            3. **JSON Export** – Machine-readable raw data export for power users and developers
            4. **Clipboard Copy** – Copy a text summary to clipboard for quick pasting

            ## PDF Report Sections
            1. System overview (detected hardware summary)
            2. Display scorecard
            3. Processor scorecard
            4. Memory & Storage scorecard
            5. Battery scorecard
            6. Overall score and Apple equivalent recommendation
            7. Timestamp and app version

            ## Implementation Notes
            - Use .NET MAUI's \`CommunityToolkit.Maui\` screenshot API or platform-specific screenshot APIs
            - PDF generation: consider \`iTextSharp\` / \`QuestPDF\` / \`PdfSharp\` for .NET
            - JSON export: serialize the ViewModel state to a well-defined JSON schema
            - Store exports in the user's Downloads folder by default; show a save dialog

            ## Success Criteria
            Users can produce a shareable scorecard from within the app in under 3 clicks.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add Export and Share Results');

      - name: Create Linux ICC Profile Support issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Linux ICC Profile Detection',
              body: `## Goal
            Complete Linux platform parity for the Display tab by implementing ICC / colour profile detection on Linux, which is currently listed as "Not currently detected" in the platform support table.

            ## Background
            Windows and macOS both expose the active ICC profile name to the app. Linux users see an empty ICC profile field, which reduces the usefulness of the Display evaluation on that platform.

            ## Implementation Plan

            ### Detection Methods (in priority order)

            1. **colord** – Query the system's \`colord\` daemon via D-Bus (\`org.freedesktop.ColorManager\`) to get the active profile for each display output
               ```
               gdbus call --system --dest org.freedesktop.ColorManager \
                 --object-path /org/freedesktop/ColorManager \
                 --method org.freedesktop.ColorManager.GetDevices
               ```

            2. **X11 ICC atom** – Read the \`_ICC_PROFILE\` X atom on the root window (set by tools like \`xcalib\` or \`dispwin\`)
               - Parse the embedded ICC binary and extract the profile description

            3. **XDG config search** – Search standard ICC profile locations:
               - \`~/.local/share/icc/\`
               - \`/usr/share/color/icc/\`
               - \`/var/lib/color/icc/\`

            4. **Wayland / KWin** – Query \`kscreen-doctor\` or \`wlr-output-management\` protocol for Wayland compositors

            ### Fallback
            If no profile is detected, display "System default (no profile loaded)" rather than an empty field.

            ## Files to Update
            - \`src/PCEval/Services/DisplayService.cs\` – Add Linux ICC detection logic
            - \`src/PCEval/Services/IDisplayService.cs\` – No interface changes expected
            - \`src/PCEval.Tests/DisplayLogicTests.cs\` – Add unit tests for ICC parsing

            ## Success Criteria
            Linux users with a colour profile loaded via \`colord\`, \`xcalib\`, or manually see the profile name in the Display tab.`,
              labels: ['enhancement', 'good first issue'],
            });
            console.log('Created: Add Linux ICC Profile Detection');

      - name: Create Camera Evaluation issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Camera / Webcam Evaluation',
              body: `## Goal
            Add a Camera tab that detects and scores the user's built-in or connected webcam against Apple's FaceTime HD and Center Stage camera systems.

            ## Background
            Apple's webcam quality (1080p FaceTime HD with Center Stage on M-series) is frequently cited as a differentiator over comparably priced Windows laptops. A camera evaluation helps users understand this gap.

            ## Key Evaluation Dimensions

            1. **Resolution** – 720p / 1080p / 4K vs Apple's FaceTime HD (1080p on M3+)
            2. **Frame Rate** – Maximum supported frame rate (30 fps / 60 fps)
            3. **Field of View** – Wide-angle vs standard (Apple FaceTime: ~82°–122° with Center Stage)
            4. **Autofocus** – Fixed focus vs continuous autofocus
            5. **Low-Light Performance** – Inferred from sensor size / aperture data where available
            6. **Background Blur / Portrait Mode** – Hardware or software supported
            7. **Center Stage / Auto-framing** – Whether the camera supports AI-driven auto-framing

            ## Apple Reference Targets
            | Model | Camera | Resolution | Features |
            |-------|--------|------------|----------|
            | MacBook Air M3 | FaceTime HD | 1080p / 30fps | No Center Stage |
            | MacBook Pro M4 | FaceTime HD | 1080p / 30fps | No Center Stage |
            | iPad Pro M4 | TrueDepth | 12MP / 4K | Center Stage |

            ## Platform Detection
            - **Windows:** Media Foundation device enumeration / WMI \`Win32_PnPEntity\`
            - **macOS:** \`AVCaptureDevice\` via \`system_profiler SPCameraDataType\`
            - **Linux:** \`v4l2-ctl --list-devices\` / \`/dev/video*\` enumeration

            ## Scorecard Metrics
            - Resolution vs Apple FaceTime HD: PASS / REVIEW / FAIL
            - Frame rate: PASS / REVIEW / FAIL
            - Autofocus: PASS / REVIEW / FAIL

            ## Success Criteria
            Users can see whether their webcam meets or exceeds Apple's FaceTime camera quality for video calls and content creation.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add Camera / Webcam Evaluation');

      - name: Create Audio Evaluation issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Audio Hardware Evaluation',
              body: `## Goal
            Add an Audio tab that evaluates the user's PC audio hardware (speakers, microphone, and audio chipset) against Apple's audio systems in the Mac lineup.

            ## Background
            Apple's MacBook Pro is widely praised for its multi-driver speaker system and high-SNR microphone array. Windows laptops vary significantly in audio quality — this evaluation helps buyers understand the gap.

            ## Key Evaluation Dimensions

            ### Speakers
            1. **Speaker Count & Configuration** – Mono / stereo / quad / six-driver array
            2. **Spatial Audio Support** – Dolby Atmos / DTS:X / Apple Spatial Audio
            3. **Force-Canceling Woofers** – Present or absent (MacBook Pro feature)
            4. **High-Impedance Headphone Output** – Support for high-impedance headphones via 3.5mm

            ### Microphone
            1. **Microphone Count** – Single / dual / three-mic array (Apple uses a three-mic array on MacBook Pro)
            2. **Studio-Quality Mic Tier** – Inferred from device metadata
            3. **Directional Beamforming** – Supported or not
            4. **Noise Suppression** – Hardware or software-based

            ### Audio Chipset
            1. **Codec / DAC Quality Tier** – Entry / mid / audiophile-grade
            2. **Sample Rate & Bit Depth** – Maximum supported (Apple: 24-bit/96kHz)

            ## Apple Reference Targets
            | Model | Speakers | Microphones | Spatial Audio |
            |-------|----------|-------------|---------------|
            | MacBook Air M3 | Stereo (2-driver) | Three-mic | Yes |
            | MacBook Pro M4 14″ | Six-driver with woofers | Three-mic studio-quality | Yes |
            | MacBook Pro M4 16″ | Six-driver with woofers | Three-mic studio-quality | Yes |

            ## Platform Detection
            - **Windows:** WMI \`Win32_SoundDevice\` / Windows Audio API
            - **macOS:** \`system_profiler SPAudioDataType\`
            - **Linux:** ALSA / PulseAudio / PipeWire device enumeration

            ## Success Criteria
            Users who care about audio quality for music production, video calls, or media consumption can see how their PC audio compares to the MacBook standard.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add Audio Hardware Evaluation');

      - name: Create Neural Engine ML Evaluation issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add Neural Engine / ML Acceleration Evaluation',
              body: `## Goal
            Add a Machine Learning / AI Acceleration tab that evaluates the user's PC NPU or AI hardware against Apple's Neural Engine — a growing differentiator as on-device AI workloads become mainstream.

            ## Background
            Apple Neural Engine (ANE) is a dedicated ML accelerator built into every Apple Silicon chip. Intel, AMD, and Qualcomm have introduced competing NPUs in recent generations. This tab helps users understand on-device AI capability trade-offs.

            ## Key Evaluation Dimensions

            1. **NPU Presence & Generation** – Dedicated NPU or none; generation (e.g., Intel AI Boost, AMD XDNA, Qualcomm Hexagon)
            2. **TOPS (Tera Operations per Second)** – Claimed AI performance vs Apple Neural Engine TOPS
            3. **AI Framework Support** – ONNX Runtime, DirectML, CoreML, TensorFlow, PyTorch
            4. **On-Device LLM Capability** – Estimated ability to run quantized LLMs (e.g., 7B / 13B models) based on NPU + memory bandwidth
            5. **Windows Copilot+ Certification** – Whether the PC meets Microsoft's Copilot+ 40 TOPS requirement
            6. **Platform AI Features** – macOS Sequoia AI features vs Windows Copilot+ features available on detected hardware

            ## Apple Neural Engine Reference
            | Chip | Neural Engine | TOPS |
            |------|--------------|------|
            | M3 | 16-core ANE | 18 |
            | M4 | 16-core ANE | 38 |
            | M4 Pro | 16-core ANE | 38 |
            | M4 Max | 16-core ANE | 38 |

            ## Scorecard Metrics
            - NPU TOPS vs Apple Neural Engine equivalent: PASS / REVIEW / FAIL
            - AI framework support breadth: PASS / REVIEW / FAIL
            - On-device LLM viability (≥7B model): PASS / REVIEW / FAIL

            ## Platform Detection
            - **Windows:** WMI / DirectML device enumeration; Registry for NPU device presence
            - **macOS:** \`system_profiler\` (ANE is always present on Apple Silicon)
            - **Linux:** \`lspci\` for NPU; \`onnxruntime\` provider enumeration

            ## Success Criteria
            Users interested in local AI workloads (LLMs, image generation, Copilot features) can see whether their PC's NPU is competitive with Apple's Neural Engine.`,
              labels: ['enhancement'],
            });
            console.log('Created: Add Neural Engine / ML Acceleration Evaluation');
